services:
  ai-watch:
    build: .
    container_name: ai-watch-alphasignal
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
